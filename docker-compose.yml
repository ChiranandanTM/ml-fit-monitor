version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Map localhost:9000 to the container's 8000 port.
      # We use 9000 because your frontend (mlApi.ts) expects the API at http://localhost:9000
      - "9000:8000"
    env_file:
      - ./backend/.env
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Access the React frontend at http://localhost:3000
      - "3000:80"
    depends_on:
      - backend
